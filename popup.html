<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__MSG_popup_title__</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <div class="toolbar" role="toolbar" aria-label="__MSG_downloads_toolbar_aria__">
          <button
            type="button"
            class="icon-btn"
            id="filters-toggle"
            aria-label="__MSG_filters_toggle__"
            aria-haspopup="true"
            aria-expanded="false"
            title="__MSG_filters_toggle__"
          >
            <svg class="icon-btn__svg" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z"
              />
            </svg>
          </button>
          <label class="search-field" for="search-input">
            <span class="visually-hidden">__MSG_search_label__</span>
            <span class="search-field__icon" aria-hidden="true">
              <svg class="search-field__icon-svg" viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
                />
              </svg>
            </span>
            <input
              type="search"
              class="search-field__input"
              id="search-input"
              placeholder="__MSG_search_placeholder__"
              autocomplete="off"
              spellcheck="false"
            />
          </label>
          <button
            type="button"
            class="icon-btn notifications-toggle"
            id="notifications-toggle"
            aria-label="__MSG_notifications_enabled__"
            title="__MSG_notifications_enabled__"
          >
            <svg class="icon-btn__svg notifications-toggle__icon" viewBox="0 0 24 24" aria-hidden="true">
              <defs>
                <mask id="notifications-toggle-mask" maskUnits="userSpaceOnUse">
                  <rect width="24" height="24" fill="white" />
                  <circle
                    class="notifications-toggle__mask-hole"
                    cx="17.5"
                    cy="6.5"
                    r="0"
                    fill="black"
                  />
                </mask>
              </defs>
              <path
                class="notifications-toggle__bell"
                fill="currentColor"
                mask="url(#notifications-toggle-mask)"
                d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
              />
              <g class="notifications-toggle__badge" aria-hidden="true">
                <circle
                  cx="17.5"
                  cy="6.5"
                  r="4.3"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                />
                <line
                  x1="14.8"
                  y1="3.8"
                  x2="20.2"
                  y2="9.2"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                />
              </g>
            </svg>
          </button>
          <button
            type="button"
            class="icon-btn theme-toggle theme-toggle--system"
            id="theme-toggle"
            aria-label="__MSG_theme_toggle_aria_system__"
            title="__MSG_theme_toggle_title_system__"
          >
            <svg
              class="icon-btn__svg theme-toggle__icon theme-toggle__icon--system"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7v2H8v2h8v-2h-2v-2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"
              />
            </svg>
            <svg
              class="icon-btn__svg theme-toggle__icon theme-toggle__icon--light"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 5V3c0-.55.45-1 1-1s1 .45 1 1v2c0 .55-.45 1-1 1s-1-.45-1-1zm0 16v-2c0-.55.45-1 1-1s1 .45 1 1v2c0 .55-.45 1-1 1s-1-.45-1-1zm5.66-12.95l1.41-1.41c.39-.39.39-1.02 0-1.41s-1.02-.39-1.41 0l-1.41 1.41c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0zM7.05 18.36l-1.41 1.41c-.39.39-.39 1.02 0 1.41s1.02.39 1.41 0l1.41-1.41c.39-.39.39-1.02 0-1.41-.39-.39-1.02-.39-1.41 0zm11.31-1.41c.39.39 1.02.39 1.41 0l1.41-1.41c.39-.39.39-1.02 0-1.41s-1.02-.39-1.41 0l-1.41 1.41c-.39.39-.39 1.02 0 1.41zM6.36 7.05l1.41-1.41c.39-.39.39-1.02 0-1.41s-1.02-.39-1.41 0l-1.41 1.41c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0z"
              />
            </svg>
            <svg
              class="icon-btn__svg theme-toggle__icon theme-toggle__icon--dark"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"
              />
            </svg>
          </button>
        </div>
      </header>
      <section
        id="clear-all-popover"
        class="clear-all-popover"
        role="dialog"
        aria-modal="false"
        aria-label="__MSG_clear_all_confirm__"
        hidden
      >
        <button type="button" class="clear-all-popover__confirm" id="clear-all-confirm">
          __MSG_clear_all_confirm__
        </button>
      </section>
      <ul id="filters-menu" class="toolbar-filter-menu" role="menu" hidden>
        <li role="presentation">
          <button
            type="button"
            id="name-sort-toggle"
            role="menuitemcheckbox"
            class="toolbar-filter-menu__item"
            aria-checked="false"
          >
            <span class="toolbar-filter-menu__dot" aria-hidden="true"></span>
            <span class="toolbar-filter-menu__label">__MSG_name_sort_default_label__</span>
          </button>
        </li>
        <li role="presentation">
          <button
            type="button"
            id="size-sort-toggle"
            role="menuitemcheckbox"
            class="toolbar-filter-menu__item"
            aria-checked="false"
          >
            <span class="toolbar-filter-menu__dot" aria-hidden="true"></span>
            <span class="toolbar-filter-menu__label">__MSG_size_sort_default_label__</span>
          </button>
        </li>
        <li role="presentation">
          <button
            type="button"
            id="status-sort-toggle"
            role="menuitemcheckbox"
            class="toolbar-filter-menu__item"
            aria-checked="false"
          >
            <span class="toolbar-filter-menu__dot" aria-hidden="true"></span>
            <span class="toolbar-filter-menu__label">__MSG_status_filter_label__</span>
          </button>
        </li>
        <li role="presentation">
          <button
            type="button"
            id="date-filter-toggle"
            role="menuitemcheckbox"
            class="toolbar-filter-menu__item"
            aria-checked="false"
            aria-haspopup="dialog"
            aria-expanded="false"
          >
            <span class="toolbar-filter-menu__dot" aria-hidden="true"></span>
            <span class="toolbar-filter-menu__label">__MSG_date_filter_label__</span>
          </button>
        </li>
        <li role="presentation">
          <button
            type="button"
            id="type-filter-toggle"
            role="menuitemcheckbox"
            class="toolbar-filter-menu__item"
            aria-checked="false"
            aria-haspopup="dialog"
            aria-expanded="false"
          >
            <span class="toolbar-filter-menu__dot" aria-hidden="true"></span>
            <span class="toolbar-filter-menu__label">__MSG_type_filter_label__</span>
          </button>
        </li>
      </ul>

      <section
        id="date-filter-popover"
        class="date-filter-popover"
        role="dialog"
        aria-modal="false"
        aria-label="__MSG_date_filter_dialog_aria__"
        hidden
      >
        <div class="date-filter-popover__quick-actions">
          <button type="button" class="date-filter-popover__quick-btn" id="date-preset-today">
            __MSG_date_filter_preset_today__
          </button>
          <button type="button" class="date-filter-popover__quick-btn" id="date-preset-week">
            __MSG_date_filter_preset_week__
          </button>
          <button type="button" class="date-filter-popover__quick-btn" id="date-preset-month">
            __MSG_date_filter_preset_month__
          </button>
        </div>
        <header class="date-filter-popover__header">
          <button
            type="button"
            class="date-filter-popover__nav-btn"
            id="date-calendar-prev"
            aria-label="__MSG_date_filter_prev_month__"
          >
            ‹
          </button>
          <h2 class="date-filter-popover__month" id="date-calendar-month-label"></h2>
          <button
            type="button"
            class="date-filter-popover__nav-btn"
            id="date-calendar-next"
            aria-label="__MSG_date_filter_next_month__"
          >
            ›
          </button>
        </header>
        <div class="date-filter-popover__weekdays" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div id="date-calendar-grid" class="date-filter-popover__calendar-grid"></div>
        <footer class="date-filter-popover__footer">
          <button type="button" class="date-filter-popover__action-btn" id="date-filter-cancel">
            __MSG_date_filter_reset__
          </button>
          <button
            type="button"
            class="date-filter-popover__action-btn date-filter-popover__action-btn--primary"
            id="date-filter-apply"
          >
            __MSG_date_filter_apply__
          </button>
        </footer>
      </section>

      <section
        id="type-filter-popover"
        class="type-filter-popover"
        role="dialog"
        aria-modal="false"
        aria-label="__MSG_type_filter_dialog_aria__"
        hidden
      >
        <header class="type-filter-popover__header">
          <h2 class="type-filter-popover__title" id="type-filter-title">__MSG_type_filter_label__</h2>
          <button
            type="button"
            class="type-filter-popover__close-btn"
            id="type-filter-close"
            aria-label="__MSG_type_filter_close__"
            title="__MSG_type_filter_close__"
          >
            ×
          </button>
        </header>
        <label class="type-filter-popover__option">
          <input type="checkbox" id="type-filter-images" />
          <span id="type-filter-images-label">__MSG_type_filter_images__</span>
        </label>
        <label class="type-filter-popover__option">
          <input type="checkbox" id="type-filter-video" />
          <span id="type-filter-video-label">__MSG_type_filter_video__</span>
        </label>
        <label class="type-filter-popover__option">
          <input type="checkbox" id="type-filter-archives" />
          <span id="type-filter-archives-label">__MSG_type_filter_archives__</span>
        </label>
        <label class="type-filter-popover__option">
          <input type="checkbox" id="type-filter-programs" />
          <span id="type-filter-programs-label">__MSG_type_filter_programs__</span>
        </label>
        <label class="type-filter-popover__option">
          <input type="checkbox" id="type-filter-documents" />
          <span id="type-filter-documents-label">__MSG_type_filter_documents__</span>
        </label>
        <label class="type-filter-popover__option">
          <input type="checkbox" id="type-filter-all" />
          <span id="type-filter-all-label">__MSG_type_filter_select_all__</span>
        </label>
      </section>

      <section id="active-filters-bar" class="active-filters-bar hidden" aria-live="polite"></section>

      <section id="state-message" class="state-message hidden" aria-live="polite"></section>

      <ul id="downloads-list" class="downloads-list" aria-label="__MSG_downloads_list_aria__">
        <li
          class="download-item download-item--pinned download-item--complete"
          id="pinned-static-item"
          data-pinned="true"
          role="group"
          aria-label="__MSG_pinned_tile_title__"
          hidden
        >
          <img
            class="download-item__icon download-item__icon--pinned"
            src="images/pinned-heart.png"
            alt=""
            draggable="false"
          />
          <div class="download-item__content">
            <p class="download-item__title" id="pinned-static-item-title">__MSG_pinned_tile_title__</p>
            <div class="download-item__meta pinned-rating">
              <svg
                class="pinned-rating__star pinned-rating__star--action"
                data-rating="1"
                role="button"
                tabindex="0"
                aria-label="1 star"
                viewBox="0 0 576 512"
              >
                <path
                  d="M259.3 17.8 194 150.2 47.9 171.5c-26.2 3.8-36.7 36.1-17.7 54.6l105.7 103-25 145.5c-4.5 26.3 23.2 46 46.4 33.7L288 439.6l130.7 68.7c23.2 12.2 50.9-7.4 46.4-33.7l-25-145.5 105.7-103c19-18.5 8.5-50.8-17.7-54.6L382 150.2 316.7 17.8c-11.7-23.6-45.6-23.9-57.4 0z"
                />
              </svg>
              <svg
                class="pinned-rating__star pinned-rating__star--action"
                data-rating="2"
                role="button"
                tabindex="0"
                aria-label="2 stars"
                viewBox="0 0 576 512"
              >
                <path
                  d="M259.3 17.8 194 150.2 47.9 171.5c-26.2 3.8-36.7 36.1-17.7 54.6l105.7 103-25 145.5c-4.5 26.3 23.2 46 46.4 33.7L288 439.6l130.7 68.7c23.2 12.2 50.9-7.4 46.4-33.7l-25-145.5 105.7-103c19-18.5 8.5-50.8-17.7-54.6L382 150.2 316.7 17.8c-11.7-23.6-45.6-23.9-57.4 0z"
                />
              </svg>
              <svg
                class="pinned-rating__star pinned-rating__star--action"
                data-rating="3"
                role="button"
                tabindex="0"
                aria-label="3 stars"
                viewBox="0 0 576 512"
              >
                <path
                  d="M259.3 17.8 194 150.2 47.9 171.5c-26.2 3.8-36.7 36.1-17.7 54.6l105.7 103-25 145.5c-4.5 26.3 23.2 46 46.4 33.7L288 439.6l130.7 68.7c23.2 12.2 50.9-7.4 46.4-33.7l-25-145.5 105.7-103c19-18.5 8.5-50.8-17.7-54.6L382 150.2 316.7 17.8c-11.7-23.6-45.6-23.9-57.4 0z"
                />
              </svg>
              <svg
                class="pinned-rating__star pinned-rating__star--action"
                data-rating="4"
                role="button"
                tabindex="0"
                aria-label="4 stars"
                viewBox="0 0 576 512"
              >
                <path
                  d="M259.3 17.8 194 150.2 47.9 171.5c-26.2 3.8-36.7 36.1-17.7 54.6l105.7 103-25 145.5c-4.5 26.3 23.2 46 46.4 33.7L288 439.6l130.7 68.7c23.2 12.2 50.9-7.4 46.4-33.7l-25-145.5 105.7-103c19-18.5 8.5-50.8-17.7-54.6L382 150.2 316.7 17.8c-11.7-23.6-45.6-23.9-57.4 0z"
                />
              </svg>
              <svg
                class="pinned-rating__star pinned-rating__star--action"
                data-rating="5"
                role="button"
                tabindex="0"
                aria-label="5 stars"
                viewBox="0 0 576 512"
              >
                <path
                  d="M259.3 17.8 194 150.2 47.9 171.5c-26.2 3.8-36.7 36.1-17.7 54.6l105.7 103-25 145.5c-4.5 26.3 23.2 46 46.4 33.7L288 439.6l130.7 68.7c23.2 12.2 50.9-7.4 46.4-33.7l-25-145.5 105.7-103c19-18.5 8.5-50.8-17.7-54.6L382 150.2 316.7 17.8c-11.7-23.6-45.6-23.9-57.4 0z"
                />
              </svg>
            </div>
          </div>
          <button
            type="button"
            class="pinned-dismiss-btn"
            id="pinned-static-item-dismiss"
            aria-label="__MSG_type_filter_close__"
            title="__MSG_type_filter_close__"
          >
            <svg class="pinned-dismiss-btn__svg" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.41 4.29 19.71 2.88 18.3 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"
              />
            </svg>
          </button>
        </li>
      </ul>
      <section id="empty-state" class="empty-state hidden" aria-live="polite">
        <svg class="empty-state__image" viewBox="0 0 220 160" aria-hidden="true">
          <rect x="35" y="22" width="150" height="116" rx="14" fill="currentColor" opacity="0.08"></rect>
          <rect x="53" y="42" width="114" height="14" rx="7" fill="currentColor" opacity="0.18"></rect>
          <rect x="53" y="68" width="94" height="10" rx="5" fill="currentColor" opacity="0.16"></rect>
          <rect x="53" y="86" width="76" height="10" rx="5" fill="currentColor" opacity="0.14"></rect>
          <circle cx="160" cy="104" r="26" fill="currentColor" opacity="0.12"></circle>
          <path d="M160 97v14M153 104h14" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
        </svg>
        <p id="empty-state-title" class="empty-state__title"></p>
      </section>
    </main>

    <div id="error-float-tip" class="error-float-tip" role="tooltip" hidden></div>
    <script src="popup.js"></script>
  </body>
</html>
